spec_version: 1
module_type: builtin
module_desc: Harness Delegate Tokens — manage authentication tokens for delegates (list/get delegate is in platform)

nouns:
  - noun: delegate_token
    short_desc: An authentication token used by delegates to connect to Harness.
    noun_aliases: [delegate_tokens]
    fields:
      - id: name
        expr: it.name
      - id: status
        expr: it.status
      - id: created_at
        label: Created
        expr: epochMs(it.createdAt)
      - id: created_by
        label: Created By
        expr: it.createdByNgUser.name

commands:
  - command: list delegate_token
    verb: list
    noun: delegate_token
    short: List delegate tokens
    handler_type: endpoint
    flags:
      - name: name
        description: Filter by token name
      - name: status
        description: "Filter by status: ACTIVE, REVOKED"
        completion_values: [ACTIVE, REVOKED]
    endpoint:
      path: /ng/api/delegate-token-ng
      query_params:
        name: flags.name
        status: flags.status
      items_expr: it.resource
      paging:
        paging_strategy: flat_list
      columns: [name, status, created_at, created_by]

  - command: create delegate_token
    verb: create
    noun: delegate_token
    short: "Create a delegate token: harness create delegate_token <name>"
    handler_type: endpoint
    endpoint:
      method: POST
      path: /ng/api/delegate-token-ng
      body_params:
        name: ctx.id
      item_expr: it.resource
      text_header: "\nCreated delegate token {{it.name}}\n"

  - command: delete delegate_token
    verb: delete
    noun: delegate_token
    confirm_mode: prompt
    short: Delete a delegate token
    handler_type: endpoint
    endpoint:
      method: DELETE
      path: /ng/api/delegate-token-ng/{{ctx.id}}
