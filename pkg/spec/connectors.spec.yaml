spec_version: 1
module_type: builtin
module_desc: Harness Connectors — create and update connector integrations (list/get/test are in platform)

commands:
  - command: create connector
    verb: create
    noun: connector
    short: "Create a connector: harness create connector <id> --set name=<name> type=Github ..."
    handler_type: endpoint
    flags_builtin:
      set: true
    endpoint:
      method: POST
      path: /ng/api/connectors
      create_strategy: set-fields
      create_body_init:
        identifier: ctx.id
        name: coalesce(ctx.setArgs.name, ctx.id)
      create_body_wrap: connector
      item_expr: it.data
      text_header: "\nCreated connector {{it.connector.identifier}}\n"

  - command: update connector
    verb: update
    noun: connector
    short: Update a connector (name, description, spec)
    handler_type: endpoint
    flags_builtin:
      set: true
      del: true
    endpoint:
      method: PUT
      path: /ng/api/connectors
      update_strategy: get-then-put
      update_body_pick: it.data.connector
      update_body_wrap: connector
      item_expr: it.data
      text_header: "\nUpdated connector {{ctx.id}}\n"

  - command: delete connector
    verb: delete
    noun: connector
    confirm_mode: prompt
    short: Delete a connector
    handler_type: endpoint
    endpoint:
      method: DELETE
      path: /ng/api/connectors/{{ctx.id}}
